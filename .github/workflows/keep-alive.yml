name: Keep Supabase Alive

# Chạy mỗi 6 tiếng để giữ Supabase project khỏi bị pause
# (Free plan: bị pause sau 7 ngày không có activity)
# Repo private: 2000 phút/tháng miễn phí -> job này dùng ~60 phút/tháng

on:
  schedule:
    - cron: '0 */6 * * *'   # 00:00, 06:00, 12:00, 18:00 UTC
  workflow_dispatch:          # Cho phép chạy thủ công từ GitHub UI

jobs:
  keep-alive:
    name: Ping Supabase Database
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Ping Supabase REST API (prevents 7-day inactivity pause)
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/activities?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "Supabase ping status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "400" ]; then
            echo "✅ Supabase is alive"
          else
            echo "⚠️ Unexpected status $HTTP_STATUS (may be waking up)"
          fi
